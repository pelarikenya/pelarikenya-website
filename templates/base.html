<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Akbar Maulana — AI Developer, Full Stack Developer, and Runner. Portfolio showcasing projects, experience, and journey in AI and Web Development.{% endblock %}">
    <meta name="keywords" content="Akbar Maulana, AI Developer, Full Stack Developer, Portfolio, Pelarikenya">
    <meta name="author" content="Akbar Maulana">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}Pelarikenya — Akbar Maulana{% endblock %}">
    <meta property="og:description" content="{% block og_description %}AI Developer, Full Stack Developer, and Runner. Portfolio showcasing projects, experience, and journey in AI and Web Development.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pelarikenya.my.id">
    <meta property="og:image" content="https://pelarikenya.my.id{{ url_for('static', filename='img/profile.jpg') }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block tw_title %}Pelarikenya — Akbar Maulana{% endblock %}">
    <meta name="twitter:description" content="{% block tw_description %}AI Developer, Full Stack Developer, and Runner.{% endblock %}">

    <title>{% block title %}Pelarikenya{% endblock %} — Akbar Maulana</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Navbar -->
    {% include 'partials/navbar.html' %}

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'partials/footer.html' %}

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
