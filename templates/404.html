{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}

<section class="section" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="container text-center">

        <h1 class="display-heading text-primary-custom mb-3 fade-in" style="font-size: 8rem; line-height: 1;">
            404
        </h1>

        <h2 class="mb-3 fade-in">Page Not Found</h2>

        <p class="text-muted mb-4 fade-in" style="max-width: 480px; margin: 0 auto;">
            The page you're looking for doesn't exist or has been moved.
        </p>

        <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg fade-in">
            <i class="bi bi-house me-2"></i>Back to Home
        </a>

    </div>
</section>

{% endblock %}
